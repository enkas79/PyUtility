name: Build Py Utility Suite EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configurazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Creazione EXE Unico (Unione 5 file)
      run: |
        pyinstaller --noconsole --onefile --name "PyUtilitySuite" --collect-all pdf2docx --add-data "ConvImage.py;." --add-data "Find_Document.py;." --add-data "PDF_plus.py;." --add-data "PDFtoWord.py;." MainSuite.py
      # --onefile: Forza l'unione di tutto in un solo .exe
      # --add-data: Assicura che i file Python secondari siano inclusi nel pacchetto

    - name: Caricamento Eseguibile
      uses: actions/upload-artifact@v4
      with:
        name: PyUtilitySuite-Completa
        path: dist/PyUtilitySuite.exe

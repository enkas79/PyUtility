name: Build Py Utility Suite EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configurazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Creazione EXE Unico
      run: |
        pyinstaller --noconsole --onefile --name "PyUtilitySuite_Completa" --collect-all pdf2docx --hidden-import ConvImage --hidden-import Find_Document --hidden-import PDF_plus --hidden-import PDFtoWord MainSuite.py
      # Spiegazione dei parametri:
      # --onefile: Questo è il comando che "unisce" fisicamente i 5 file in uno solo
      # --hidden-import: Forza l'inclusione dei tuoi moduli se PyInstaller avesse dubbi
      # MainSuite.py: Il file principale che lancia l'interfaccia

    - name: Caricamento Eseguibile
      uses: actions/upload-artifact@v4
      with:
        name: PyUtilitySuite-Completa
        path: dist/PyUtilitySuite.exe
